<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mi diario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=Space+Grotesk:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --bg2: #ede8de;
      --ink: #1a1714;
      --ink2: #6b6460;
      --ink3: #a09890;
      --accent: #8b6f47;
      --line: rgba(0,0,0,0.08);
      --font-body: 'Lora', Georgia, serif;
      --font-ui: 'Space Grotesk', sans-serif;
      --radius: 3px;
      --tr: 0.22s ease;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      min-height: 100vh;
      transition: background var(--tr), color var(--tr);
    }

    /* ── LOGIN SCREEN ── */
    #loginScreen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 1000;
      gap: 0;
    }

    #loginScreen.hidden { display: none; }

    .login-title {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 15px;
      color: var(--ink3);
      letter-spacing: 0.08em;
      margin-bottom: 2.5rem;
    }

    /* ── Auth forms ── */
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      width: min(320px, 90vw);
      padding: 0 1rem;
      animation: fadeIn 0.18s ease;
    }

    .auth-form.hidden { display: none; }

    .auth-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .auth-input {
      font-family: var(--font-ui);
      font-size: 14px;
      color: var(--ink);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--line);
      padding: 6px 0;
      outline: none;
      width: 100%;
      transition: border-color var(--tr);
    }

    .auth-input:focus { border-bottom-color: var(--ink3); }
    .auth-input::placeholder { color: var(--ink3); }

    .auth-switch {
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--ink3);
      text-align: center;
      margin-top: 0.25rem;
    }

    .auth-switch span {
      color: var(--ink2);
      cursor: pointer;
      text-decoration: underline;
    }

    .auth-switch span:hover { color: var(--ink); }

    .pw-error {
      font-family: var(--font-ui);
      font-size: 11px;
      color: #b94040;
      min-height: 16px;
    }

    /* ── APP ── */
    #appScreen { display: none; }
    #appScreen.visible { display: block; }

    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 3rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--line);
    }

    .site-name {
      font-family: var(--font-body);
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: lowercase;
      color: var(--ink2);
      font-style: italic;
    }

    .top-actions { display: flex; gap: 6px; align-items: center; }

    .current-user {
      display: flex; align-items: center; gap: 6px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 20px;
      border: 1px solid var(--line);
      transition: background var(--tr);
    }

    .current-user:hover { background: var(--bg2); }

    .current-user-avatar {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--bg2);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      font-family: var(--font-ui);
      font-weight: 500;
      color: var(--ink2);
    }

    .current-user-name {
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--ink2);
    }

    .btn {
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 6px 12px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--ink2);
      cursor: pointer;
      border-radius: var(--radius);
      transition: all var(--tr);
      display: inline-flex; align-items: center; gap: 5px;
      white-space: nowrap;
    }

    .btn:hover { background: var(--bg2); color: var(--ink); border-color: rgba(0,0,0,0.15); }

    .btn-primary {
      background: var(--ink); color: var(--bg); border-color: transparent;
    }

    .btn-primary:hover { opacity: 0.82; background: var(--ink); color: var(--bg); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .date-wrap { margin-bottom: 0.5rem; }

    .date-label {
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 6px;
      display: block;
    }

    input[type="date"] {
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--ink);
      background: transparent;
      border: none;
      outline: none;
      padding: 2px 0;
      cursor: pointer;
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      opacity: 0.35;
      cursor: pointer;
      filter: var(--cal-filter, none);
    }

    .location-wrap { margin-bottom: 0.5rem; }

    .location-input {
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--ink);
      background: transparent;
      border: none;
      outline: none;
      padding: 2px 0;
      width: 100%;
      border-bottom: 1px solid transparent;
      transition: border-color var(--tr);
    }

    .location-input:focus { border-bottom-color: var(--line); }
    .location-input::placeholder { color: var(--ink3); }

    .divider { border: none; border-top: 1px solid var(--line); margin: 1rem 0 1.5rem; }

    /* ── Photo blocks ── */
    .photo-blocks { display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 1.5rem; }

    .photo-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 0.75rem;
      position: relative;
    }

    .photo-block img {
      width: 100%;
      max-height: 480px;
      object-fit: cover;
      border-radius: 2px;
      display: block;
    }

    .photo-caption {
      font-family: var(--font-body);
      font-size: 14px;
      font-style: italic;
      color: var(--ink2);
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      resize: none;
      line-height: 1.6;
      padding: 4px 0;
      border-bottom: 1px solid transparent;
      transition: border-color var(--tr);
    }

    .photo-caption:focus { border-bottom-color: var(--line); }
    .photo-caption::placeholder { color: var(--ink3); }

    .photo-block-del {
      position: absolute;
      top: 6px; right: 6px;
      background: rgba(0,0,0,0.45);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 22px; height: 22px;
      font-size: 11px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity var(--tr);
    }

    .photo-block:hover .photo-block-del { opacity: 1; }

    .entry-area {
      width: 100%;
      min-height: 320px;
      resize: none;
      font-family: var(--font-body);
      font-size: 17px;
      line-height: 1.9;
      color: var(--ink);
      background: transparent;
      border: none;
      outline: none;
      display: block;
    }

    .entry-area::placeholder { color: var(--ink3); font-style: italic; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--line);
      flex-wrap: wrap;
      gap: 8px;
    }

    .toolbar-left { display: flex; gap: 6px; flex-wrap: wrap; }
    .toolbar-right { display: flex; gap: 6px; align-items: center; }

    .char-count { font-family: var(--font-ui); font-size: 11px; color: var(--ink3); }

    .save-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--ink3);
      display: inline-block;
      margin-right: 4px;
      transition: background var(--tr);
    }

    .save-dot.dirty { background: #c07a30; }
    .save-dot.saved { background: #5a9a6a; }

    /* ── Entries list ── */
    .entries-section { margin-top: 3.5rem; padding-top: 2rem; border-top: 1px solid var(--line); }

    .section-label {
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 1.25rem;
    }

    .entry-row {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      transition: opacity var(--tr);
    }

    .entry-row:last-child { border-bottom: none; }
    .entry-row:hover { opacity: 0.7; }

    .entry-row-date { font-family: var(--font-ui); font-size: 11px; color: var(--ink3); min-width: 90px; }
    .entry-row-preview { font-family: var(--font-body); font-size: 14px; color: var(--ink2); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-style: italic; }
    .entry-row-location { font-family: var(--font-ui); font-size: 11px; color: var(--ink3); font-style: normal; }

    .entry-row-del {
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--ink3);
      background: none; border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 2px;
      opacity: 0;
      transition: opacity var(--tr);
    }

    .entry-row:hover .entry-row-del { opacity: 1; }
    .entry-row-del:hover { color: #b94040; }

    .empty-state { font-family: var(--font-body); font-style: italic; color: var(--ink3); font-size: 14px; padding: 1rem 0; }

    /* ── Settings panel ── */
    .settings-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 500;
      align-items: flex-start;
      justify-content: flex-end;
    }

    .settings-backdrop.open { display: flex; }

    .settings-panel {
      background: var(--bg);
      border-left: 1px solid var(--line);
      width: min(320px, 92vw);
      height: 100vh;
      overflow-y: auto;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      animation: slideIn 0.22s ease;
    }

    @keyframes slideIn { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }
    @keyframes fadeIn  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .settings-title { font-family: var(--font-ui); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink3); margin-bottom: 0.75rem; }

    .font-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .font-option {
      border: 1px solid var(--line);
      background: transparent;
      padding: 10px 10px 8px;
      cursor: pointer;
      border-radius: var(--radius);
      text-align: left;
      transition: all var(--tr);
    }

    .font-option:hover { border-color: rgba(0,0,0,0.2); }
    .font-option.active { border-color: var(--ink); background: var(--bg2); }

    .font-option-name { font-family: var(--font-ui); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink3); display: block; margin-bottom: 4px; }
    .font-option-sample { font-size: 16px; color: var(--ink); line-height: 1.2; }

    .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }

    .color-swatch {
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform var(--tr), border-color var(--tr);
    }

    .color-swatch:hover { transform: scale(1.1); }
    .color-swatch.active { border-color: var(--ink); transform: scale(1.05); }

    .size-row { display: flex; align-items: center; gap: 10px; }
    .size-row input[type="range"] { flex: 1; accent-color: var(--ink); cursor: pointer; }
    .size-label { font-family: var(--font-ui); font-size: 11px; color: var(--ink2); min-width: 24px; text-align: right; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--ink); color: var(--bg);
      font-family: var(--font-ui);
      font-size: 12px;
      padding: 9px 18px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      white-space: nowrap;
      z-index: 3000;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .page { padding: 2rem 1.25rem 5rem; }
      .entry-area { font-size: 16px; min-height: 260px; }
      .font-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ══════════════════ LOGIN SCREEN ══════════════════ -->
<div id="loginScreen">
  <p class="login-title">mi diario</p>

  <!-- Login -->
  <div class="auth-form" id="loginForm">
    <div class="auth-field">
      <label class="date-label">correo</label>
      <input type="email" id="loginEmail" class="auth-input" placeholder="tu@correo.com"
        onkeydown="if(event.key==='Enter') doLogin()" autocomplete="email" />
    </div>
    <div class="auth-field">
      <label class="date-label">contraseña</label>
      <input type="password" id="loginPassword" class="auth-input" placeholder="••••••••"
        onkeydown="if(event.key==='Enter') doLogin()" autocomplete="current-password" />
    </div>
    <p class="pw-error" id="loginError"></p>
    <button class="btn btn-primary" onclick="doLogin()" id="loginBtn">Entrar</button>
    <p class="auth-switch">¿Sin cuenta? <span onclick="showRegister()">Crear una</span></p>
  </div>

  <!-- Register -->
  <div class="auth-form hidden" id="registerForm">
    <div class="auth-field">
      <label class="date-label">nombre</label>
      <input type="text" id="regName" class="auth-input" placeholder="Tu nombre" maxlength="30"
        onkeydown="if(event.key==='Enter') doRegister()" autocomplete="name" />
    </div>
    <div class="auth-field">
      <label class="date-label">correo</label>
      <input type="email" id="regEmail" class="auth-input" placeholder="tu@correo.com"
        onkeydown="if(event.key==='Enter') doRegister()" autocomplete="email" />
    </div>
    <div class="auth-field">
      <label class="date-label">contraseña</label>
      <input type="password" id="regPassword" class="auth-input" placeholder="Mínimo 6 caracteres"
        onkeydown="if(event.key==='Enter') doRegister()" autocomplete="new-password" />
    </div>
    <p class="pw-error" id="registerError"></p>
    <button class="btn btn-primary" onclick="doRegister()" id="registerBtn">Crear cuenta</button>
    <p class="auth-switch">¿Ya tienes cuenta? <span onclick="showLogin()">Entrar</span></p>
  </div>
</div>

<!-- ══════════════════ APP SCREEN ══════════════════ -->
<div id="appScreen">
  <div class="page">

    <div class="top-bar">
      <span class="site-name">mi diario</span>
      <div class="top-actions">
        <span class="save-dot" id="saveDot"></span>
        <span class="char-count" id="charCount">0</span>
        <button class="btn" onclick="openSettings()" title="Personalizar">⚙</button>
        <div class="current-user" onclick="logout()" title="Cerrar sesión">
          <div class="current-user-avatar" id="currentUserAvatar"></div>
          <span class="current-user-name" id="currentUserName"></span>
        </div>
      </div>
    </div>

    <div class="date-wrap">
      <label class="date-label" for="entryDate">fecha</label>
      <input type="date" id="entryDate" />
    </div>

    <div class="location-wrap">
      <label class="date-label" for="entryLocation">ubicación</label>
      <input type="text" class="location-input" id="entryLocation"
        placeholder="¿Dónde estás?" maxlength="80"
        oninput="setDirty()" autocomplete="off" />
    </div>

    <hr class="divider" />

    <div class="photo-blocks" id="photoBlocks"></div>

    <textarea class="entry-area" id="entryText"
      placeholder="¿Qué pasó hoy?"
      spellcheck="true"
      aria-label="Entrada del diario"></textarea>

    <div class="toolbar">
      <div class="toolbar-left">
        <button class="btn btn-primary" onclick="saveEntry()">Guardar</button>
        <button class="btn" onclick="newEntry()">Nueva entrada</button>
        <label class="btn" style="cursor:pointer;" title="Añadir foto">
          📷 Foto
          <input type="file" accept="image/*" style="display:none" multiple onchange="addPhotos(this)" />
        </label>
      </div>
      <div class="toolbar-right">
        <button class="btn" onclick="downloadEntry()">↓ .txt</button>
        <button class="btn" onclick="exportAll()">Exportar todo</button>
      </div>
    </div>

    <div class="entries-section">
      <div class="section-label">entradas anteriores</div>
      <div id="entriesList"></div>
    </div>

  </div>
</div>

<!-- Settings panel -->
<div class="settings-backdrop" id="settingsBackdrop" onclick="closeSettingsIfBackdrop(event)">
  <div class="settings-panel">
    <div>
      <div class="settings-title">fuente</div>
      <div class="font-grid" id="fontGrid"></div>
    </div>
    <div>
      <div class="settings-title">tamaño de texto</div>
      <div class="size-row">
        <span style="font-size:12px;color:var(--ink3);font-family:var(--font-ui)">A</span>
        <input type="range" min="14" max="22" value="17" id="sizeSlider" oninput="setFontSize(this.value)" />
        <span style="font-size:18px;color:var(--ink3);font-family:var(--font-ui)">A</span>
        <span class="size-label" id="sizeLabel">17</span>
      </div>
    </div>
    <div>
      <div class="settings-title">color de fondo</div>
      <div class="color-grid" id="colorGrid"></div>
    </div>
    <button class="btn" onclick="closeSettings()" style="margin-top:auto;">Cerrar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
/* ══════════════════════════════════════
   FIREBASE
══════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyASo1TnUhs-ZtMKNSu218J9VFaHyre5qDQ",
  authDomain: "mi-diario-b106f.firebaseapp.com",
  projectId: "mi-diario-b106f",
  storageBucket: "mi-diario-b106f.firebasestorage.app",
  messagingSenderId: "434581761458",
  appId: "1:434581761458:web:4daf40ba8f4c91c2a308ab"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let currentUser        = null;
let unsubscribeEntries = null;
let cachedEntries      = [];
let currentFontKey     = 'lora';
let currentColorKey    = 'cream';
let currentSize        = 17;

/* ══════════════════════════════════════
   AUTH STATE LISTENER
══════════════════════════════════════ */
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('appScreen').classList.add('visible');
    initApp();
  } else {
    if (unsubscribeEntries) { unsubscribeEntries(); unsubscribeEntries = null; }
    currentUser = null;
    cachedEntries = [];
    document.getElementById('appScreen').classList.remove('visible');
    document.getElementById('loginScreen').classList.remove('hidden');
    showLogin();
  }
});

/* ══════════════════════════════════════
   LOGIN / REGISTER
══════════════════════════════════════ */
function showLogin() {
  document.getElementById('registerForm').classList.add('hidden');
  document.getElementById('loginForm').classList.remove('hidden');
  document.getElementById('loginError').textContent = '';
  setTimeout(() => document.getElementById('loginEmail').focus(), 50);
}

function showRegister() {
  document.getElementById('loginForm').classList.add('hidden');
  document.getElementById('registerForm').classList.remove('hidden');
  document.getElementById('registerError').textContent = '';
  setTimeout(() => document.getElementById('regName').focus(), 50);
}

function fbError(code) {
  const map = {
    'auth/invalid-email':        'Correo inválido',
    'auth/user-not-found':       'No hay cuenta con ese correo',
    'auth/wrong-password':       'Contraseña incorrecta',
    'auth/invalid-credential':   'Correo o contraseña incorrectos',
    'auth/email-already-in-use': 'Ese correo ya está en uso',
    'auth/weak-password':        'La contraseña debe tener al menos 6 caracteres',
    'auth/too-many-requests':    'Demasiados intentos. Intenta más tarde',
  };
  return map[code] || 'Error. Intenta de nuevo';
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  const btn   = document.getElementById('loginBtn');
  if (!email || !pass) { errEl.textContent = 'Completa los campos'; return; }
  btn.textContent = '…'; btn.disabled = true;
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    errEl.textContent = fbError(e.code);
    btn.textContent = 'Entrar'; btn.disabled = false;
  }
}

async function doRegister() {
  const name  = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPassword').value;
  const errEl = document.getElementById('registerError');
  const btn   = document.getElementById('registerBtn');
  if (!name)  { errEl.textContent = 'Escribe tu nombre'; return; }
  if (!email) { errEl.textContent = 'Escribe tu correo'; return; }
  if (!pass)  { errEl.textContent = 'Escribe una contraseña'; return; }
  btn.textContent = '…'; btn.disabled = true;
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await cred.user.updateProfile({ displayName: name });
    // onAuthStateChanged handles the transition
  } catch(e) {
    errEl.textContent = fbError(e.code);
    btn.textContent = 'Crear cuenta'; btn.disabled = false;
  }
}

async function logout() {
  if (!confirm('¿Cerrar sesión?')) return;
  await auth.signOut();
}

/* ══════════════════════════════════════
   PREFERENCES — localStorage (por dispositivo)
══════════════════════════════════════ */
const PREFS_KEY = 'diario_prefs_v3';
function loadPrefs(uid)        { try { return JSON.parse(localStorage.getItem(PREFS_KEY+'_'+uid)||'{}'); } catch(e) { return {}; } }
function savePrefsData(uid, o) { localStorage.setItem(PREFS_KEY+'_'+uid, JSON.stringify(o)); }

/* ══════════════════════════════════════
   FOTOS — localStorage (por dispositivo)
══════════════════════════════════════ */
function photosKey(uid, date)          { return 'diario_photos_v1_'+uid+'_'+date; }
function loadPhotos(uid, date)         { try { return JSON.parse(localStorage.getItem(photosKey(uid,date))||'[]'); } catch(e) { return []; } }
function savePhotosLocal(uid, date, p) { localStorage.setItem(photosKey(uid,date), JSON.stringify(p)); }

/* ══════════════════════════════════════
   HELPERS
══════════════════════════════════════ */
function todayISO() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function fmtDate(iso) {
  const [y,m,d] = iso.split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return d+' '+months[+m-1]+' '+y;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

/* ══════════════════════════════════════
   APP INIT
══════════════════════════════════════ */
function initApp() {
  const name    = currentUser.displayName || currentUser.email.split('@')[0];
  const avatarEl = document.getElementById('currentUserAvatar');
  avatarEl.textContent = name[0].toUpperCase();
  document.getElementById('currentUserName').textContent = name;

  const prefs = loadPrefs(currentUser.uid);
  if (prefs.color) applyColor(prefs.color);
  if (prefs.font)  applyFont(prefs.font);
  if (prefs.size) { document.getElementById('sizeSlider').value = prefs.size; setFontSize(prefs.size); }

  document.getElementById('entryDate').value     = todayISO();
  document.getElementById('entryText').value     = '';
  document.getElementById('entryLocation').value = '';
  document.getElementById('photoBlocks').innerHTML = '';
  updateCount();

  if (unsubscribeEntries) unsubscribeEntries();
  unsubscribeEntries = db.collection('users').doc(currentUser.uid)
    .collection('entries')
    .orderBy('date', 'desc')
    .onSnapshot(snapshot => {
      cachedEntries = snapshot.docs.map(d => d.data());
      renderList();
    });
}

/* ══════════════════════════════════════
   SAVE / LOAD
══════════════════════════════════════ */
const dot = document.getElementById('saveDot');
function setDirty() { dot.classList.remove('saved'); dot.classList.add('dirty'); }
function setSaved() { dot.classList.remove('dirty'); dot.classList.add('saved'); setTimeout(()=>dot.classList.remove('saved'),2500); }

function collectPhotos() {
  return Array.from(document.querySelectorAll('.photo-block')).map(b => ({
    src:     b.querySelector('img').src,
    caption: b.querySelector('.photo-caption').value,
  }));
}

async function saveEntry() {
  const date     = document.getElementById('entryDate').value;
  const text     = document.getElementById('entryText').value.trim();
  const location = document.getElementById('entryLocation').value.trim();
  const photos   = collectPhotos();
  if (!text && !photos.length) { toast('Escribe algo o añade una foto'); return; }

  savePhotosLocal(currentUser.uid, date, photos);

  try {
    await db.collection('users').doc(currentUser.uid)
      .collection('entries').doc(date)
      .set({ date, text, location, updated: firebase.firestore.FieldValue.serverTimestamp() });
    setSaved();
    toast('Guardado ✓');
  } catch(e) {
    toast('Error al guardar');
  }
}

function newEntry() {
  document.getElementById('entryDate').value     = todayISO();
  document.getElementById('entryText').value     = '';
  document.getElementById('entryLocation').value = '';
  document.getElementById('photoBlocks').innerHTML = '';
  updateCount();
  dot.classList.remove('dirty','saved');
  document.getElementById('entryText').focus();
}

function loadEntry(date) {
  const e = cachedEntries.find(e => e.date === date);
  if (!e) return;
  document.getElementById('entryDate').value     = e.date;
  document.getElementById('entryText').value     = e.text || '';
  document.getElementById('entryLocation').value = e.location || '';
  const container = document.getElementById('photoBlocks');
  container.innerHTML = '';
  loadPhotos(currentUser.uid, date).forEach(p => appendPhotoBlock(p.src, p.caption));
  updateCount();
  dot.classList.remove('dirty','saved');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function deleteEntry(date) {
  if (!confirm('¿Eliminar esta entrada?')) return;
  try {
    await db.collection('users').doc(currentUser.uid).collection('entries').doc(date).delete();
    localStorage.removeItem(photosKey(currentUser.uid, date));
    if (document.getElementById('entryDate').value === date) newEntry();
    toast('Entrada eliminada');
  } catch(e) {
    toast('Error al eliminar');
  }
}

function renderList() {
  const el = document.getElementById('entriesList');
  if (!cachedEntries.length) {
    el.innerHTML = '<p class="empty-state">Aún no hay entradas guardadas.</p>';
    return;
  }
  el.innerHTML = cachedEntries.map(e => {
    const photos      = loadPhotos(currentUser.uid, e.date);
    const preview     = e.text ? e.text.substring(0,80) : (photos.length ? `[${photos.length} foto${photos.length>1?'s':''}]` : '');
    const locationHtml = e.location ? `<span class="entry-row-location">📍 ${e.location.replace(/</g,'&lt;')}</span>` : '';
    return `
      <div class="entry-row" onclick="loadEntry('${e.date}')">
        <span class="entry-row-date">${fmtDate(e.date)}</span>
        <span class="entry-row-preview">${preview.replace(/</g,'&lt;')}${locationHtml ? ' · ' : ''}${locationHtml}</span>
        <button class="entry-row-del" onclick="event.stopPropagation();deleteEntry('${e.date}')" aria-label="Eliminar">✕</button>
      </div>
    `;
  }).join('');
}

/* ══════════════════════════════════════
   PHOTOS
══════════════════════════════════════ */
function addPhotos(input) {
  Array.from(input.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => { appendPhotoBlock(e.target.result, ''); setDirty(); };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function appendPhotoBlock(src, caption) {
  const container = document.getElementById('photoBlocks');
  const block = document.createElement('div');
  block.className = 'photo-block';
  block.innerHTML = `
    <button class="photo-block-del" onclick="this.parentElement.remove();setDirty();" title="Eliminar foto">✕</button>
    <img src="${src}" alt="foto" />
    <textarea class="photo-caption" placeholder="Escribe algo sobre esta foto…" rows="2" oninput="setDirty()">${caption}</textarea>
  `;
  container.appendChild(block);
}

/* ══════════════════════════════════════
   EXPORT
══════════════════════════════════════ */
function updateCount() {
  document.getElementById('charCount').textContent = document.getElementById('entryText').value.length;
}

document.getElementById('entryText').addEventListener('input', () => { updateCount(); setDirty(); });

function downloadEntry() {
  const date     = document.getElementById('entryDate').value;
  const text     = document.getElementById('entryText').value.trim();
  const location = document.getElementById('entryLocation').value.trim();
  if (!text) { toast('Nada para descargar'); return; }
  const header = fmtDate(date) + (location ? '  ·  ' + location : '');
  dl(header + '\n' + '─'.repeat(36) + '\n\n' + text, 'diario-' + date + '.txt');
}

function exportAll() {
  if (!cachedEntries.length) { toast('No hay entradas aún'); return; }
  const content = [...cachedEntries].sort((a,b) => a.date.localeCompare(b.date)).map(e => {
    const header = fmtDate(e.date) + (e.location ? '  ·  ' + e.location : '');
    const photos = loadPhotos(currentUser.uid, e.date);
    return header + '\n' + '─'.repeat(36) + '\n\n' + (e.text || '') +
      (photos.length ? '\n\n[' + photos.length + ' foto(s) en esta entrada]' : '');
  }).join('\n\n\n');
  dl(content, 'mi-diario.txt');
  toast('Diario exportado');
}

function dl(text, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], { type: 'text/plain;charset=utf-8' }));
  a.download = name;
  a.click();
}

/* ══════════════════════════════════════
   SETTINGS
══════════════════════════════════════ */
const FONTS = [
  { key: 'lora',     label: 'Lora',     css: "'Lora', Georgia, serif",             sample: 'Hoy pensé…' },
  { key: 'playfair', label: 'Playfair', css: "'Playfair Display', Georgia, serif", sample: 'Hoy pensé…' },
  { key: 'crimson',  label: 'Crimson',  css: "'Crimson Pro', Georgia, serif",      sample: 'Hoy pensé…' },
  { key: 'fraunces', label: 'Fraunces', css: "'Fraunces', Georgia, serif",         sample: 'Hoy pensé…' },
  { key: 'mono',     label: 'Mono',     css: "'DM Mono', monospace",               sample: 'Hoy pensé…' },
  { key: 'sans',     label: 'Sans',     css: "'Space Grotesk', sans-serif",        sample: 'Hoy pensé…' },
];

const COLORS = [
  { key: 'cream',  bg:'#f5f0e8', bg2:'#ede8de', ink:'#1a1714', ink2:'#6b6460', ink3:'#a09890' },
  { key: 'chalk',  bg:'#f8f7f4', bg2:'#eeede8', ink:'#1c1c1c', ink2:'#666',    ink3:'#aaa'    },
  { key: 'dusk',   bg:'#1e1c2a', bg2:'#16151f', ink:'#e8e6f0', ink2:'#9d9ab0', ink3:'#5c5a70' },
  { key: 'forest', bg:'#f0f4ef', bg2:'#e4eae3', ink:'#1a2318', ink2:'#4a5e46', ink3:'#8aa085' },
  { key: 'rose',   bg:'#faf3f3', bg2:'#f2e8e8', ink:'#271818', ink2:'#7a4f4f', ink3:'#b08888' },
  { key: 'slate',  bg:'#f0f2f5', bg2:'#e4e8ee', ink:'#151b26', ink2:'#4e5a6e', ink3:'#8a96a8' },
  { key: 'sand',   bg:'#faf6ec', bg2:'#f0ead8', ink:'#2a200c', ink2:'#6e5a38', ink3:'#a8956a' },
  { key: 'night',  bg:'#0f0f13', bg2:'#0a0a0d', ink:'#e8e8ec', ink2:'#8888a0', ink3:'#4a4a60' },
  { key: 'blush',  bg:'#fdf4f8', bg2:'#f5e8f0', ink:'#1f1020', ink2:'#6b4a6e', ink3:'#a888ac' },
  { key: 'mint',   bg:'#f0faf6', bg2:'#e0f2ea', ink:'#0d2018', ink2:'#3a6050', ink3:'#80a898' },
];

function applyColor(key) {
  const c = COLORS.find(x => x.key === key);
  if (!c) return;
  const r = document.documentElement.style;
  r.setProperty('--bg',   c.bg);
  r.setProperty('--bg2',  c.bg2);
  r.setProperty('--ink',  c.ink);
  r.setProperty('--ink2', c.ink2);
  r.setProperty('--ink3', c.ink3);
  r.setProperty('--cal-filter', parseInt(c.bg.slice(1,3),16) < 100 ? 'invert(1)' : 'none');
  currentColorKey = key;
  document.querySelectorAll('.color-swatch').forEach(el => el.classList.toggle('active', el.dataset.key === key));
  if (currentUser) savePrefsData(currentUser.uid, { ...loadPrefs(currentUser.uid), color: key });
}

function applyFont(key) {
  const f = FONTS.find(x => x.key === key);
  if (!f) return;
  document.documentElement.style.setProperty('--font-body', f.css);
  document.querySelector('.entry-area').style.fontFamily = f.css;
  currentFontKey = key;
  document.querySelectorAll('.font-option').forEach(el => el.classList.toggle('active', el.dataset.key === key));
  if (currentUser) savePrefsData(currentUser.uid, { ...loadPrefs(currentUser.uid), font: key });
}

function setFontSize(val) {
  document.querySelector('.entry-area').style.fontSize = val + 'px';
  document.getElementById('sizeLabel').textContent = val;
  currentSize = +val;
  if (currentUser) savePrefsData(currentUser.uid, { ...loadPrefs(currentUser.uid), size: +val });
}

function buildSettings() {
  document.getElementById('fontGrid').innerHTML = FONTS.map(f => `
    <button class="font-option ${f.key === currentFontKey ? 'active' : ''}" data-key="${f.key}" onclick="applyFont('${f.key}')">
      <span class="font-option-name">${f.label}</span>
      <span class="font-option-sample" style="font-family:${f.css}">${f.sample}</span>
    </button>
  `).join('');

  document.getElementById('colorGrid').innerHTML = COLORS.map(c => `
    <button class="color-swatch ${c.key === currentColorKey ? 'active' : ''}"
      data-key="${c.key}"
      style="background:${c.bg}; border: 2px solid ${c.ink2};"
      onclick="applyColor('${c.key}')"
      title="${c.key}"
      aria-label="Color ${c.key}"></button>
  `).join('');
}

function openSettings()              { buildSettings(); document.getElementById('settingsBackdrop').classList.add('open'); }
function closeSettings()             { document.getElementById('settingsBackdrop').classList.remove('open'); }
function closeSettingsIfBackdrop(e)  { if (e.target === document.getElementById('settingsBackdrop')) closeSettings(); }
</script>
