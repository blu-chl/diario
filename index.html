<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mi diario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=Space+Grotesk:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --bg2: #ede8de;
      --ink: #1a1714;
      --ink2: #6b6460;
      --ink3: #a09890;
      --accent: #8b6f47;
      --line: rgba(0,0,0,0.08);
      --font-body: 'Lora', Georgia, serif;
      --font-ui: 'Space Grotesk', sans-serif;
      --radius: 3px;
      --tr: 0.22s ease;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      min-height: 100vh;
      transition: background var(--tr), color var(--tr);
    }

    /* вФАвФА LOGIN SCREEN вФАвФА */
    #loginScreen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 1000;
      gap: 0;
    }

    #loginScreen.hidden { display: none; }

    .login-title {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 15px;
      color: var(--ink3);
      letter-spacing: 0.08em;
      margin-bottom: 2.5rem;
    }

    .users-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: center;
      max-width: 560px;
      padding: 0 1rem;
      margin-bottom: 2.5rem;
    }

    .user-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 12px;
      border-radius: 8px;
      transition: background var(--tr);
      min-width: 90px;
    }

    .user-card:hover { background: var(--bg2); }

    .user-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--bg2);
      border: 2px solid var(--line);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      font-family: var(--font-ui);
      font-weight: 500;
      color: var(--ink2);
      overflow: hidden;
      transition: border-color var(--tr);
      position: relative;
    }

    .user-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .user-card:hover .user-avatar { border-color: var(--ink3); }

    .user-card-name {
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--ink2);
      text-align: center;
    }

    .add-user-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 12px;
      border-radius: 8px;
      transition: background var(--tr);
      min-width: 90px;
    }

    .add-user-card:hover { background: var(--bg2); }

    .add-user-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 2px dashed var(--ink3);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      color: var(--ink3);
    }

    .add-user-label {
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--ink3);
    }

    /* Password prompt */
    .pw-prompt {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      animation: fadeIn 0.18s ease;
    }

    .pw-prompt.hidden { display: none; }

    .pw-back {
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--ink3);
      cursor: pointer;
      letter-spacing: 0.06em;
    }

    .pw-back:hover { color: var(--ink2); }

    .pw-who {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 16px;
      color: var(--ink2);
    }

    .pw-avatar-sm {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--bg2);
      border: 2px solid var(--line);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      font-family: var(--font-ui);
      font-weight: 500;
      color: var(--ink2);
      overflow: hidden;
    }

    .pw-avatar-sm img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .pw-field {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .pw-dots {
      display: flex; gap: 10px;
    }

    .pw-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 1.5px solid var(--ink3);
      transition: background var(--tr), border-color var(--tr);
    }

    .pw-dot.filled { background: var(--ink); border-color: var(--ink); }

    .pw-input-real {
      width: 160px;
      text-align: center;
      font-size: 14px;
      font-family: var(--font-ui);
      border: none;
      border-bottom: 1px solid var(--line);
      background: transparent;
      color: var(--ink);
      padding: 6px 0;
      outline: none;
    }

    .pw-input-real:focus { border-bottom-color: var(--ink3); }

    .pw-error {
      font-family: var(--font-ui);
      font-size: 11px;
      color: #b94040;
      min-height: 16px;
    }

    /* New user modal */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 2rem 1.75rem;
      width: min(340px, 90vw);
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .modal-title {
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink3);
    }

    .modal label {
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink3);
      display: block;
      margin-bottom: 5px;
    }

    .modal input[type="text"],
    .modal input[type="password"] {
      width: 100%;
      font-family: var(--font-ui);
      font-size: 14px;
      color: var(--ink);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--line);
      padding: 6px 0;
      outline: none;
    }

    .modal input:focus { border-bottom-color: var(--ink3); }

    .emoji-picker {
      display: flex; flex-wrap: wrap; gap: 6px;
    }

    .emoji-btn {
      width: 34px; height: 34px;
      border: 1px solid var(--line);
      background: transparent;
      border-radius: var(--radius);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--tr);
    }

    .emoji-btn:hover, .emoji-btn.active { background: var(--bg2); border-color: var(--ink3); }

    .avatar-upload-btn {
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--ink3);
      border: 1px dashed var(--ink3);
      background: transparent;
      padding: 6px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      display: inline-block;
      text-align: center;
    }

    .avatar-preview {
      width: 48px; height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--line);
      display: none;
    }

    .modal-actions {
      display: flex; gap: 8px; justify-content: flex-end;
    }

    /* вФАвФА APP вФАвФА */
    #appScreen { display: none; }
    #appScreen.visible { display: block; }

    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 3rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--line);
    }

    .site-name {
      font-family: var(--font-body);
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: lowercase;
      color: var(--ink2);
      font-style: italic;
    }

    .top-actions { display: flex; gap: 6px; align-items: center; }

    .current-user {
      display: flex; align-items: center; gap: 6px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 20px;
      border: 1px solid var(--line);
      transition: background var(--tr);
    }

    .current-user:hover { background: var(--bg2); }

    .current-user-avatar {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--bg2);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      overflow: hidden;
    }

    .current-user-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .current-user-name {
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--ink2);
    }

    .btn {
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 6px 12px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--ink2);
      cursor: pointer;
      border-radius: var(--radius);
      transition: all var(--tr);
      display: inline-flex; align-items: center; gap: 5px;
      white-space: nowrap;
    }

    .btn:hover { background: var(--bg2); color: var(--ink); border-color: rgba(0,0,0,0.15); }

    .btn-primary {
      background: var(--ink); color: var(--bg); border-color: transparent;
    }

    .btn-primary:hover { opacity: 0.82; background: var(--ink); color: var(--bg); }

    .date-wrap { margin-bottom: 0.5rem; }

    .date-label {
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 6px;
      display: block;
    }

    input[type="date"] {
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--ink);
      background: transparent;
      border: none;
      outline: none;
      padding: 2px 0;
      cursor: pointer;
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      opacity: 0.35;
      cursor: pointer;
      filter: var(--cal-filter, none);
    }

    .location-wrap { margin-bottom: 0.5rem; }

    .location-input {
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--ink);
      background: transparent;
      border: none;
      outline: none;
      padding: 2px 0;
      width: 100%;
      border-bottom: 1px solid transparent;
      transition: border-color var(--tr);
    }

    .location-input:focus { border-bottom-color: var(--line); }
    .location-input::placeholder { color: var(--ink3); }

    .divider { border: none; border-top: 1px solid var(--line); margin: 1rem 0 1.5rem; }

    /* вФАвФА Photo blocks вФАвФА */
    .photo-blocks { display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 1.5rem; }

    .photo-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 0.75rem;
      position: relative;
    }

    .photo-block img {
      width: 100%;
      max-height: 480px;
      object-fit: cover;
      border-radius: 2px;
      display: block;
    }

    .photo-caption {
      font-family: var(--font-body);
      font-size: 14px;
      font-style: italic;
      color: var(--ink2);
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      resize: none;
      line-height: 1.6;
      padding: 4px 0;
      border-bottom: 1px solid transparent;
      transition: border-color var(--tr);
    }

    .photo-caption:focus { border-bottom-color: var(--line); }
    .photo-caption::placeholder { color: var(--ink3); }

    .photo-block-del {
      position: absolute;
      top: 6px; right: 6px;
      background: rgba(0,0,0,0.45);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 22px; height: 22px;
      font-size: 11px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity var(--tr);
    }

    .photo-block:hover .photo-block-del { opacity: 1; }

    .entry-area {
      width: 100%;
      min-height: 320px;
      resize: none;
      font-family: var(--font-body);
      font-size: 17px;
      line-height: 1.9;
      color: var(--ink);
      background: transparent;
      border: none;
      outline: none;
      display: block;
    }

    .entry-area::placeholder { color: var(--ink3); font-style: italic; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--line);
      flex-wrap: wrap;
      gap: 8px;
    }

    .toolbar-left { display: flex; gap: 6px; flex-wrap: wrap; }
    .toolbar-right { display: flex; gap: 6px; align-items: center; }

    .char-count { font-family: var(--font-ui); font-size: 11px; color: var(--ink3); }

    .save-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--ink3);
      display: inline-block;
      margin-right: 4px;
      transition: background var(--tr);
    }

    .save-dot.dirty { background: #c07a30; }
    .save-dot.saved { background: #5a9a6a; }

    /* вФАвФА Entries list вФАвФА */
    .entries-section { margin-top: 3.5rem; padding-top: 2rem; border-top: 1px solid var(--line); }

    .section-label {
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 1.25rem;
    }

    .entry-row {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      transition: opacity var(--tr);
    }

    .entry-row:last-child { border-bottom: none; }
    .entry-row:hover { opacity: 0.7; }

    .entry-row-date { font-family: var(--font-ui); font-size: 11px; color: var(--ink3); min-width: 90px; }
    .entry-row-preview { font-family: var(--font-body); font-size: 14px; color: var(--ink2); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-style: italic; }
    .entry-row-location { font-family: var(--font-ui); font-size: 11px; color: var(--ink3); font-style: normal; }

    .entry-row-del {
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--ink3);
      background: none; border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 2px;
      opacity: 0;
      transition: opacity var(--tr);
    }

    .entry-row:hover .entry-row-del { opacity: 1; }
    .entry-row-del:hover { color: #b94040; }

    .empty-state { font-family: var(--font-body); font-style: italic; color: var(--ink3); font-size: 14px; padding: 1rem 0; }

    /* вФАвФА Settings panel вФАвФА */
    .settings-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 500;
      align-items: flex-start;
      justify-content: flex-end;
    }

    .settings-backdrop.open { display: flex; }

    .settings-panel {
      background: var(--bg);
      border-left: 1px solid var(--line);
      width: min(320px, 92vw);
      height: 100vh;
      overflow-y: auto;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      animation: slideIn 0.22s ease;
    }

    @keyframes slideIn { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }
    @keyframes fadeIn  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .settings-title { font-family: var(--font-ui); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink3); margin-bottom: 0.75rem; }

    .font-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .font-option {
      border: 1px solid var(--line);
      background: transparent;
      padding: 10px 10px 8px;
      cursor: pointer;
      border-radius: var(--radius);
      text-align: left;
      transition: all var(--tr);
    }

    .font-option:hover { border-color: rgba(0,0,0,0.2); }
    .font-option.active { border-color: var(--ink); background: var(--bg2); }

    .font-option-name { font-family: var(--font-ui); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink3); display: block; margin-bottom: 4px; }
    .font-option-sample { font-size: 16px; color: var(--ink); line-height: 1.2; }

    .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }

    .color-swatch {
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform var(--tr), border-color var(--tr);
    }

    .color-swatch:hover { transform: scale(1.1); }
    .color-swatch.active { border-color: var(--ink); transform: scale(1.05); }

    .size-row { display: flex; align-items: center; gap: 10px; }
    .size-row input[type="range"] { flex: 1; accent-color: var(--ink); cursor: pointer; }
    .size-label { font-family: var(--font-ui); font-size: 11px; color: var(--ink2); min-width: 24px; text-align: right; }

    /* вФАвФА Toast вФАвФА */
    .toast {
      position: fixed;
      bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--ink); color: var(--bg);
      font-family: var(--font-ui);
      font-size: 12px;
      padding: 9px 18px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      white-space: nowrap;
      z-index: 3000;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .page { padding: 2rem 1.25rem 5rem; }
      .entry-area { font-size: 16px; min-height: 260px; }
      .font-grid { grid-template-columns: 1fr; }
      .users-grid { gap: 1rem; }
    }
  </style>
</head>
<body>

<!-- вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР LOGIN SCREEN вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР -->
<div id="loginScreen">
  <p class="login-title">mi diario</p>

  <div class="users-grid" id="usersGrid"></div>

  <div class="pw-prompt hidden" id="pwPrompt">
    <span class="pw-back" onclick="backToUsers()">вЖР volver</span>
    <div class="pw-avatar-sm" id="pwAvatarSm"></div>
    <span class="pw-who" id="pwWho"></span>
    <div class="pw-field">
      <div class="pw-dots" id="pwDots"></div>
      <input type="password" class="pw-input-real" id="pwInput"
        placeholder="contrase√±a"
        maxlength="30"
        oninput="onPwInput()"
        onkeydown="if(event.key==='Enter') tryLogin()" />
    </div>
    <p class="pw-error" id="pwError"></p>
    <button class="btn btn-primary" onclick="tryLogin()">Entrar</button>
  </div>
</div>

<!-- вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР NEW USER MODAL вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР -->
<div class="modal-backdrop" id="newUserModal">
  <div class="modal">
    <div class="modal-title">nuevo usuario</div>

    <div>
      <label>nombre</label>
      <input type="text" id="nuName" placeholder="Tu nombre" maxlength="20" />
    </div>

    <div>
      <label>√≠cono</label>
      <div class="emoji-picker" id="emojiPicker"></div>
      <div style="margin-top:8px; display:flex; align-items:center; gap:8px;">
        <label class="avatar-upload-btn" for="avatarFileInput">Subir foto</label>
        <input type="file" id="avatarFileInput" accept="image/*" style="display:none" onchange="previewAvatar(this)" />
        <img id="avatarPreview" class="avatar-preview" alt="avatar preview" />
      </div>
    </div>

    <div>
      <label>contrase√±a</label>
      <input type="password" id="nuPass" placeholder="M√≠nimo 4 caracteres" maxlength="30" />
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeNewUserModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="createUser()">Crear</button>
    </div>
  </div>
</div>

<script>
/* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
   STORAGE KEYS & HELPERS
вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
const USERS_KEY  = 'diario_users_v3';
const PREFS_KEY  = 'diario_prefs_v3';

function loadUsers() {
  try { return JSON.parse(localStorage.getItem(USERS_KEY) || '[]'); } catch(e) { return []; }
}
function saveUsers(arr) { localStorage.setItem(USERS_KEY, JSON.stringify(arr)); }

function entriesKey(uid) { return 'diario_entries_v3_' + uid; }
function loadEntries(uid) {
  try { return JSON.parse(localStorage.getItem(entriesKey(uid)) || '[]'); } catch(e) { return []; }
}
function saveEntries(uid, arr) { localStorage.setItem(entriesKey(uid), JSON.stringify(arr)); }

function loadPrefs(uid) {
  try { return JSON.parse(localStorage.getItem(PREFS_KEY + '_' + uid) || '{}'); } catch(e) { return {}; }
}
function savePrefsData(uid, obj) { localStorage.setItem(PREFS_KEY + '_' + uid, JSON.stringify(obj)); }

function uid() { return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }

function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function fmtDate(iso) {
  const [y,m,d] = iso.split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return d + ' ' + months[+m-1] + ' ' + y;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function hashPass(p) {
  // simple hash вАФ not crypto, but prevents plain text storage
  let h = 0;
  for (let i = 0; i < p.length; i++) { h = (Math.imul(31, h) + p.charCodeAt(i)) | 0; }
  return h.toString(16);
}

/* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
   STATE
вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
let currentUser = null;
let pendingLoginUser = null;
let selectedEmoji = 'рЯУЦ';
let avatarDataUrl = null;
let currentFontKey = 'lora';
let currentColorKey = 'cream';
let currentSize = 17;

/* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
   LOGIN SCREEN
вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
const EMOJIS = ['рЯУЦ','вЬПпЄП','рЯМЄ','рЯМЩ','вШБпЄП','рЯ¶Л','рЯМњ','рЯФЃ','рЯМК','в≠Р','рЯО®','рЯХѓпЄП'];

function renderLoginScreen() {
  const users = loadUsers();
  const grid = document.getElementById('usersGrid');
  grid.innerHTML = '';

  users.forEach(u => {
    const card = document.createElement('div');
    card.className = 'user-card';
    card.onclick = () => selectUser(u);

    let avatarHtml;
    if (u.avatar) {
      avatarHtml = `<img src="${u.avatar}" alt="${u.name}" />`;
    } else {
      avatarHtml = u.emoji || 'рЯУЦ';
    }

    card.innerHTML = `
      <div class="user-avatar">${avatarHtml}</div>
      <span class="user-card-name">${u.name}</span>
    `;
    grid.appendChild(card);
  });

  // Add user button
  const addCard = document.createElement('div');
  addCard.className = 'add-user-card';
  addCard.onclick = openNewUserModal;
  addCard.innerHTML = `
    <div class="add-user-icon">+</div>
    <span class="add-user-label">Nuevo usuario</span>
  `;
  grid.appendChild(addCard);

  document.getElementById('usersGrid').classList.remove('hidden');
  document.getElementById('pwPrompt').classList.add('hidden');
}

function selectUser(u) {
  pendingLoginUser = u;
  document.getElementById('usersGrid').classList.add('hidden');
  const prompt = document.getElementById('pwPrompt');
  prompt.classList.remove('hidden');

  // avatar
  const avatarSm = document.getElementById('pwAvatarSm');
  if (u.avatar) {
    avatarSm.innerHTML = `<img src="${u.avatar}" alt="${u.name}" />`;
  } else {
    avatarSm.textContent = u.emoji || 'рЯУЦ';
  }

  document.getElementById('pwWho').textContent = u.name;
  document.getElementById('pwInput').value = '';
  document.getElementById('pwError').textContent = '';
  buildPwDots('');
  setTimeout(() => document.getElementById('pwInput').focus(), 100);
}

function buildPwDots(val) {
  const dots = document.getElementById('pwDots');
  const len = Math.min(val.length, 8);
  dots.innerHTML = Array.from({length: 8}, (_,i) =>
    `<div class="pw-dot ${i < len ? 'filled' : ''}"></div>`
  ).join('');
}

function onPwInput() {
  buildPwDots(document.getElementById('pwInput').value);
  document.getElementById('pwError').textContent = '';
}

function tryLogin() {
  const u = pendingLoginUser;
  const pw = document.getElementById('pwInput').value;
  if (hashPass(pw) !== u.passHash) {
    document.getElementById('pwError').textContent = 'Contrase√±a incorrecta';
    document.getElementById('pwInput').value = '';
    buildPwDots('');
    return;
  }
  currentUser = u;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appScreen').classList.add('visible');
  initApp();
}

function backToUsers() {
  pendingLoginUser = null;
  document.getElementById('pwPrompt').classList.add('hidden');
  document.getElementById('usersGrid').classList.remove('hidden');
}

function logout() {
  if (!confirm('¬њCerrar sesi√≥n?')) return;
  currentUser = null;
  document.getElementById('appScreen').classList.remove('visible');
  document.getElementById('loginScreen').classList.remove('hidden');
  renderLoginScreen();
}

/* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
   NEW USER MODAL
вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
function openNewUserModal() {
  selectedEmoji = 'рЯУЦ';
  avatarDataUrl = null;
  document.getElementById('nuName').value = '';
  document.getElementById('nuPass').value = '';
  document.getElementById('avatarPreview').style.display = 'none';
  document.getElementById('avatarPreview').src = '';
  document.getElementById('avatarFileInput').value = '';
  buildEmojiPicker();
  document.getElementById('newUserModal').classList.add('open');
  setTimeout(() => document.getElementById('nuName').focus(), 100);
}

function closeNewUserModal() {
  document.getElementById('newUserModal').classList.remove('open');
}

function buildEmojiPicker() {
  const el = document.getElementById('emojiPicker');
  el.innerHTML = EMOJIS.map(e => `
    <button class="emoji-btn ${e === selectedEmoji ? 'active' : ''}"
      onclick="pickEmoji('${e}')">${e}</button>
  `).join('');
}

function pickEmoji(e) {
  selectedEmoji = e;
  avatarDataUrl = null;
  document.getElementById('avatarPreview').style.display = 'none';
  buildEmojiPicker();
}

function previewAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    avatarDataUrl = e.target.result;
    const img = document.getElementById('avatarPreview');
    img.src = avatarDataUrl;
    img.style.display = 'block';
    // deselect emoji
    document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active'));
  };
  reader.readAsDataURL(file);
}

function createUser() {
  const name = document.getElementById('nuName').value.trim();
  const pass = document.getElementById('nuPass').value;
  if (!name) { toast('Escribe un nombre'); return; }
  if (pass.length < 4) { toast('Contrase√±a muy corta (m√≠n. 4)'); return; }
  const users = loadUsers();
  if (users.find(u => u.name.toLowerCase() === name.toLowerCase())) {
    toast('Ese nombre ya existe'); return;
  }
  const newU = {
    id: uid(),
    name,
    passHash: hashPass(pass),
    emoji: avatarDataUrl ? null : selectedEmoji,
    avatar: avatarDataUrl || null,
  };
  users.push(newU);
  saveUsers(users);
  closeNewUserModal();
  renderLoginScreen();
  toast('Usuario creado вЬУ');
}

/* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
   APP INIT
вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
function initApp() {
  // header
  const avatarEl = document.getElementById('currentUserAvatar');
  if (currentUser.avatar) {
    avatarEl.innerHTML = `<img src="${currentUser.avatar}" alt="${currentUser.name}" />`;
  } else {
    avatarEl.textContent = currentUser.emoji || 'рЯУЦ';
  }
  document.getElementById('currentUserName').textContent = currentUser.name;

  // load prefs
  const prefs = loadPrefs(currentUser.id);
  if (prefs.color) applyColor(prefs.color);
  if (prefs.font)  applyFont(prefs.font);
  if (prefs.size) {
    document.getElementById('sizeSlider').value = prefs.size;
    setFontSize(prefs.size);
  }

  // init entry
  document.getElementById('entryDate').value = todayISO();
  document.getElementById('entryText').value = '';
  document.getElementById('photoBlocks').innerHTML = '';
  updateCount();
  renderList();
}

/* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
   SAVE / LOAD ENTRIES
вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
const dot = document.getElementById('saveDot');
function setDirty() { dot.classList.remove('saved'); dot.classList.add('dirty'); }
function setSaved() { dot.classList.remove('dirty'); dot.classList.add('saved'); setTimeout(()=>dot.classList.remove('saved'),2500); }

function collectPhotos() {
  const blocks = document.querySelectorAll('.photo-block');
  return Array.from(blocks).map(b => ({
    src: b.querySelector('img').src,
    caption: b.querySelector('.photo-caption').value,
  }));
}

function saveEntry() {
  const date = document.getElementById('entryDate').value;
  const text = document.getElementById('entryText').value.trim();
  const location = document.getElementById('entryLocation').value.trim();
  const photos = collectPhotos();
  if (!text && !photos.length) { toast('Escribe algo o a√±ade una foto'); return; }
  const entries = loadEntries(currentUser.id);
  const idx = entries.findIndex(e => e.date === date);
  const entry = { date, text, location, photos, updated: Date.now() };
  if (idx >= 0) { entries[idx] = entry; }
  else { entries.unshift(entry); }
  saveEntries(currentUser.id, entries);
  setSaved();
  toast('Guardado вЬУ');
  renderList();
}

function newEntry() {
  document.getElementById('entryDate').value = todayISO();
  document.getElementById('entryText').value = '';
  document.getElementById('entryLocation').value = '';
  document.getElementById('photoBlocks').innerHTML = '';
  updateCount();
  dot.classList.remove('dirty','saved');
  document.getElementById('entryText').focus();
}

function loadEntry(date) {
  const e = loadEntries(currentUser.id).find(e => e.date === date);
  if (!e) return;
  document.getElementById('entryDate').value = e.date;
  document.getElementById('entryText').value = e.text || '';
  document.getElementById('entryLocation').value = e.location || '';
  const container = document.getElementById('photoBlocks');
  container.innerHTML = '';
  (e.photos || []).forEach(p => appendPhotoBlock(p.src, p.caption));
  updateCount();
  dot.classList.remove('dirty','saved');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function deleteEntry(date) {
  if (!confirm('¬њEliminar esta entrada?')) return;
  const entries = loadEntries(currentUser.id).filter(e => e.date !== date);
  saveEntries(currentUser.id, entries);
  if (document.getElementById('entryDate').value === date) newEntry();
  toast('Entrada eliminada');
  renderList();
}

function renderList() {
  const entries = loadEntries(currentUser.id);
  const el = document.getElementById('entriesList');
  if (!entries.length) {
    el.innerHTML = '<p class="empty-state">A√Їn no hay entradas guardadas.</p>';
    return;
  }
  el.innerHTML = entries.map(e => {
    const hasPhoto = e.photos && e.photos.length;
    const preview = e.text ? e.text.substring(0,80) : (hasPhoto ? `[${e.photos.length} foto${e.photos.length>1?'s':''}]` : '');
    const locationHtml = e.location ? `<span class="entry-row-location">рЯУН ${e.location.replace(/</g,'&lt;')}</span>` : '';
    return `
      <div class="entry-row" onclick="loadEntry('${e.date}')">
        <span class="entry-row-date">${fmtDate(e.date)}</span>
        <span class="entry-row-preview">${preview.replace(/</g,'&lt;')}${locationHtml ? ' ¬Ј ' : ''}${locationHtml}</span>
        <button class="entry-row-del" onclick="event.stopPropagation();deleteEntry('${e.date}')" aria-label="Eliminar">вЬХ</button>
      </div>
    `;
  }).join('');
}

/* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
   PHOTOS
вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
function addPhotos(input) {
  const files = Array.from(input.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      appendPhotoBlock(e.target.result, '');
      setDirty();
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function appendPhotoBlock(src, caption) {
  const container = document.getElementById('photoBlocks');
  const block = document.createElement('div');
  block.className = 'photo-block';
  block.innerHTML = `
    <button class="photo-block-del" onclick="this.parentElement.remove();setDirty();" title="Eliminar foto">вЬХ</button>
    <img src="${src}" alt="foto" />
    <textarea class="photo-caption" placeholder="Escribe algo sobre esta fotoвА¶" rows="2" oninput="setDirty()">${caption}</textarea>
  `;
  container.appendChild(block);
}

/* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
   EXPORT
вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
function updateCount() {
  document.getElementById('charCount').textContent = document.getElementById('entryText').value.length;
}

document.getElementById('entryText').addEventListener('input', () => { updateCount(); setDirty(); });

function downloadEntry() {
  const date = document.getElementById('entryDate').value;
  const text = document.getElementById('entryText').value.trim();
  const location = document.getElementById('entryLocation').value.trim();
  if (!text) { toast('Nada para descargar'); return; }
  const header = fmtDate(date) + (location ? '  ¬Ј  ' + location : '');
  dl(header + '\n' + 'вФА'.repeat(36) + '\n\n' + text, 'diario-' + date + '.txt');
}

function exportAll() {
  const entries = loadEntries(currentUser.id);
  if (!entries.length) { toast('No hay entradas a√Їn'); return; }
  const content = [...entries].sort((a,b) => a.date.localeCompare(b.date)).map(e => {
    const header = fmtDate(e.date) + (e.location ? '  ¬Ј  ' + e.location : '');
    return header + '\n' + 'вФА'.repeat(36) + '\n\n' + (e.text || '') +
      (e.photos && e.photos.length ? '\n\n[' + e.photos.length + ' foto(s) en esta entrada]' : '');
  }).join('\n\n\n');
  dl(content, 'mi-diario.txt');
  toast('Diario exportado');
}

function dl(text, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], { type: 'text/plain;charset=utf-8' }));
  a.download = name;
  a.click();
}

/* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
   SETTINGS
вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
const FONTS = [
  { key: 'lora',     label: 'Lora',     css: "'Lora', Georgia, serif",             sample: 'Hoy pens√©вА¶' },
  { key: 'playfair', label: 'Playfair', css: "'Playfair Display', Georgia, serif", sample: 'Hoy pens√©вА¶' },
  { key: 'crimson',  label: 'Crimson',  css: "'Crimson Pro', Georgia, serif",      sample: 'Hoy pens√©вА¶' },
  { key: 'fraunces', label: 'Fraunces', css: "'Fraunces', Georgia, serif",         sample: 'Hoy pens√©вА¶' },
  { key: 'mono',     label: 'Mono',     css: "'DM Mono', monospace",               sample: 'Hoy pens√©вА¶' },
  { key: 'sans',     label: 'Sans',     css: "'Space Grotesk', sans-serif",        sample: 'Hoy pens√©вА¶' },
];

const COLORS = [
  { key: 'cream',  bg:'#f5f0e8', bg2:'#ede8de', ink:'#1a1714', ink2:'#6b6460', ink3:'#a09890' },
  { key: 'chalk',  bg:'#f8f7f4', bg2:'#eeede8', ink:'#1c1c1c', ink2:'#666',    ink3:'#aaa'    },
  { key: 'dusk',   bg:'#1e1c2a', bg2:'#16151f', ink:'#e8e6f0', ink2:'#9d9ab0', ink3:'#5c5a70' },
  { key: 'forest', bg:'#f0f4ef', bg2:'#e4eae3', ink:'#1a2318', ink2:'#4a5e46', ink3:'#8aa085' },
  { key: 'rose',   bg:'#faf3f3', bg2:'#f2e8e8', ink:'#271818', ink2:'#7a4f4f', ink3:'#b08888' },
  { key: 'slate',  bg:'#f0f2f5', bg2:'#e4e8ee', ink:'#151b26', ink2:'#4e5a6e', ink3:'#8a96a8' },
  { key: 'sand',   bg:'#faf6ec', bg2:'#f0ead8', ink:'#2a200c', ink2:'#6e5a38', ink3:'#a8956a' },
  { key: 'night',  bg:'#0f0f13', bg2:'#0a0a0d', ink:'#e8e8ec', ink2:'#8888a0', ink3:'#4a4a60' },
  { key: 'blush',  bg:'#fdf4f8', bg2:'#f5e8f0', ink:'#1f1020', ink2:'#6b4a6e', ink3:'#a888ac' },
  { key: 'mint',   bg:'#f0faf6', bg2:'#e0f2ea', ink:'#0d2018', ink2:'#3a6050', ink3:'#80a898' },
];

function applyColor(key) {
  const c = COLORS.find(x => x.key === key);
  if (!c) return;
  const r = document.documentElement.style;
  r.setProperty('--bg', c.bg);
  r.setProperty('--bg2', c.bg2);
  r.setProperty('--ink', c.ink);
  r.setProperty('--ink2', c.ink2);
  r.setProperty('--ink3', c.ink3);
  const isDark = parseInt(c.bg.slice(1,3),16) < 100;
  r.setProperty('--cal-filter', isDark ? 'invert(1)' : 'none');
  currentColorKey = key;
  document.querySelectorAll('.color-swatch').forEach(el =>
    el.classList.toggle('active', el.dataset.key === key));
  if (currentUser) savePrefsData(currentUser.id, { ...loadPrefs(currentUser.id), color: key });
}

function applyFont(key) {
  const f = FONTS.find(x => x.key === key);
  if (!f) return;
  document.documentElement.style.setProperty('--font-body', f.css);
  document.querySelector('.entry-area').style.fontFamily = f.css;
  currentFontKey = key;
  document.querySelectorAll('.font-option').forEach(el =>
    el.classList.toggle('active', el.dataset.key === key));
  if (currentUser) savePrefsData(currentUser.id, { ...loadPrefs(currentUser.id), font: key });
}

function setFontSize(val) {
  document.querySelector('.entry-area').style.fontSize = val + 'px';
  document.getElementById('sizeLabel').textContent = val;
  currentSize = +val;
  if (currentUser) savePrefsData(currentUser.id, { ...loadPrefs(currentUser.id), size: +val });
}

function buildSettings() {
  document.getElementById('fontGrid').innerHTML = FONTS.map(f => `
    <button class="font-option ${f.key === currentFontKey ? 'active' : ''}" data-key="${f.key}" onclick="applyFont('${f.key}')">
      <span class="font-option-name">${f.label}</span>
      <span class="font-option-sample" style="font-family:${f.css}">${f.sample}</span>
    </button>
  `).join('');

  document.getElementById('colorGrid').innerHTML = COLORS.map(c => `
    <button class="color-swatch ${c.key === currentColorKey ? 'active' : ''}"
      data-key="${c.key}"
      style="background:${c.bg}; border: 2px solid ${c.ink2};"
      onclick="applyColor('${c.key}')"
      title="${c.key}"
      aria-label="Color ${c.key}"></button>
  `).join('');
}

function openSettings() { buildSettings(); document.getElementById('settingsBackdrop').classList.add('open'); }
function closeSettings() { document.getElementById('settingsBackdrop').classList.remove('open'); }
function closeSettingsIfBackdrop(e) { if (e.target === document.getElementById('settingsBackdrop')) closeSettings(); }
